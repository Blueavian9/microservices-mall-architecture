# Auth service + Postgres + NATS for local dev / integration
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5433:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-m", "8222"]

  auth-service:
    build: .
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://platform:platform@postgres:5432/platform
      JWT_SECRET: dev_jwt_secret_must_be_at_least_32_chars_long_xx
      JWT_REFRESH_SECRET: dev_refresh_secret_must_be_32_chars_min_yyy
      NATS_URL: nats://nats:4222
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  auth_pgdata:
